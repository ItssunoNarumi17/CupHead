<!DOCTYPE html>

<body class="contenedor-layout">
    <header>
        <h1>GALERÍA Y CINE</h1>
        <button id="theme-toggle">Modo Obscuro</button>
    </header>
    
    <nav>
        <a href="/index.html">Inicio</a> |

    <main>
        <section class="intro-box">
            <h2>Galería Interactiva</h2>
            <img id="main-gal" src="/img/cuphead1.jpg" style="width:100%; max-width:600px; display:block; margin:0 auto 15px;">
            
            <div style="display:flex; gap:10px; justify-content:center">
                <img src="/img/cuphead1.jpg" style="width:50px; cursor:pointer;" onclick="document.getElementById('main-gal').src=this.src">
                <img src="/img/cuphead2.jpg" style="width:50px; cursor:pointer;" onclick="document.getElementById('main-gal').src=this.src">
                <img src="/img/cuphead3.jpg" style="width:50px; cursor:pointer;" onclick="document.getElementById('main-gal').src=this.src">
            </div>
        </section>

        <section class="intro-box">
            <h3>Audio y Video</h3>
            <audio controls style="width:100%; margin-bottom:20px;">
                <source src="/audio/soundtrack_ Ruse Of An Ooze.mp3" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>

            <video controls width="100%">
                <source src="/video/trailerxbox_cuphead.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </section>
    </main>

    <button id="btn-top">⬆️</button>
