<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuphead | Registro de Deudores</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="contenedor-layout">
    <header class="header-principal">
        <h1>CONTRATO CON EL CASINO</h1>
        <button id="theme-toggle" class="boton-modo">Modo Obscuro</button>
    </header>

    <nav>
        <a href="/index.html">Inicio</a> | 
        <a href="/tabla.html">Tabla</a> | 
        <a href="/formulario.html">Formulario</a> | 
        <a href="/multimedia.html">Multimedia</a> | 
        <a href="/historia.html">Historia</a> | 
        <a href="/crud.html">CRUD</a>
    </nav>

    <div class="container">
        <main class="seccion-principal">
            <h2>Únete a las Islas Inkwell</h2>
            <p style="margin-bottom: 20px;">Firma este contrato para registrarte en la base de datos del Casino del Diablo.</p>

            <section class="vinculos-box">
                <form id="cuphead-form" onsubmit="alert('¡Contrato firmado! El Diablo te contactará pronto...'); return false;">
                    <fieldset style="border: 2px solid #000; padding: 20px; border-radius: 10px;">
                        <legend style="font-weight: bold; padding: 0 10px;"> FIRMA TU CONTRATO </legend>
                        
                        <label for="nom">Nombre de Deudor (ID):</label>
                        <input type="text" id="nom" required placeholder="Ej: Player1" style="width: 100%; margin-bottom: 15px;">
                        
                        <label for="mail">Correo Electrónico:</label>
                        <input type="email" id="mail" required placeholder="tu@correo.com" style="width: 100%; margin-bottom: 15px;">
                        
                        <label for="isla-select">Isla de Residencia:</label>
                        <select id="isla-select" style="width: 100%; margin-bottom: 15px; padding: 5px;">
                            <option>Inkwell Isle I</option>
                            <option>Inkwell Isle II</option>
                            <option>Inkwell Isle III</option>
                            <option>Inkwell Hell</option>
                        </select>

                        <label for="juego">Jefe Favorito:</label>
                        <input type="text" id="juego" placeholder="Ej: King Dice, Baroness Von Bon Bon" style="width: 100%; margin-bottom: 15px;">

                        <label for="msg">Mensaje para el Diablo:</label>
                        <textarea id="msg" rows="4" placeholder="¿Por qué deberías conservar tu alma?" style="width: 100%; margin-bottom: 15px;"></textarea>

                        <button type="submit" class="boton" style="width: 100%;">Firmar Contrato</button>
                    </fieldset>
                </form>
            </section>
        </main>
    </div>

    <button id="btn-top">⬆️</button>
    
    <footer>
        <p>Copyright &copy; 2026 - Cuphead Fan Page Arius</p>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
