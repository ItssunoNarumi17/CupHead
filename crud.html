<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuphead | Gestión Administrativa</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <style>
        .grid-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .panel-cuphead { background: rgba(0,0,0,0.9); border: 2px solid #d32f2f; border-radius: 10px; padding: 20px; color: white; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; color: #000; }
        .lista-datos { list-style: none; padding: 0; margin-top: 15px; }
        .lista-datos li { background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 5px solid #d32f2f; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; }
        .btn-cancelar { background: #7f8c8d; width: 100%; margin-top: 5px; display: none; }
    </style>
</head>
<body class="contenedor-layout">
    <header class="header-principal">
        <h1>SISTEMA DE CONTROL ISLAS INKWELL</h1>
        <button id="theme-toggle">Modo Obscuro</button>
    </header>

    <nav>
        <a href="/index.html">Inicio</a> | 
        <a href="/tabla.html">Tabla</a> | 
        <a href="/formulario.html">Formulario</a> | 
        <a href="/multimedia.html">Multimedia</a> | 
        <a href="/historia.html">Historia</a> | 
        <a href="/crud.html">CRUD</a>
    </nav>
    
    <div class="grid-triple">
        <section class="panel-cuphead" id="sec-inv">
            <h2>🛒 Tienda Porkind</h2>
            <input type="hidden" id="pId">
            <input type="text" id="pNombre" placeholder="Objeto">
            <input type="number" id="pPrecio" placeholder="Precio">
            <button id="pBtn" onclick="procesar('inventario')" class="boton" style="width:100%">Guardar</button>
            <button id="pCancel" onclick="cancelar('p')" class="boton btn-cancelar">Cancelar</button>
            <ul id="listaInv" class="lista-datos"></ul>
        </section>

        <section class="panel-cuphead" id="sec-exp">
            <h2>🎮 Batallas</h2>
            <input type="hidden" id="eId">
            <input type="text" id="eJugador" placeholder="Nickname">
            <input type="text" id="eJefe" placeholder="Jefe derrotado">
            <button id="eBtn" onclick="procesar('experiencias')" class="boton" style="width:100%">Registrar</button>
            <button id="eCancel" onclick="cancelar('e')" class="boton btn-cancelar">Cancelar</button>
            <ul id="listaExp" class="lista-datos"></ul>
        </section>

        <section class="panel-cuphead" id="sec-jef">
            <h2>👾 Lore de Jefes</h2>
            <input type="hidden" id="jId">
            <input type="text" id="jNombre" placeholder="Nombre Jefe">
            <select id="jIsla"><option>Inkwell Isle I</option><option>Inkwell Isle II</option><option>Inkwell Isle III</option></select>
            <button id="jBtn" onclick="procesar('jefes')" class="boton" style="width:100%">Añadir</button>
            <button id="jCancel" onclick="cancelar('j')" class="boton btn-cancelar">Cancelar</button>
            <ul id="listaJefes" class="lista-datos"></ul>
        </section>
    </div>

    <button id="btn-top">⬆️</button>

    <footer>
        <p>Copyright &copy; 2026 - Cuphead Fan Page Arius</p>
    </footer>

    <script src="/js/script.js"></script>

    <script>
        // CAMBIO CRÍTICO: Usamos la URL relativa para que funcione en Render
        const API = '/api';

        async function cargarTodo() {
            const fetchAndRender = async (col, listId, pre, f1, f2) => {
                try {
                    const res = await fetch(`${API}/${col}`);
                    const data = await res.json();
                    document.getElementById(listId).innerHTML = data.map(item => `
                        <li>
                            <div><b>${item[f1]}</b> - ${item[f2]}</div>
                            <div style="margin-top:5px">
                                <button class="btn-edit" onclick="editar('${pre}', ${JSON.stringify(item).replace(/"/g, '&quot;')})">Editar</button>
                                <button class="btn-del" onclick="eliminar('${col}', '${item._id}')">Borrar</button>
                            </div>
                        </li>`).join('');
                } catch (err) { console.error("Error al cargar " + col, err); }
            };
            fetchAndRender('inventario', 'listaInv', 'p', 'nombre', 'precio');
            fetchAndRender('experiencias', 'listaExp', 'e', 'jugador', 'jefe');
            fetchAndRender('jefes', 'listaJefes', 'j', 'nombre', 'isla');
        }

        async function procesar(col) {
            const pre = col[0];
            const id = document.getElementById(pre + 'Id').value;
            const payload = col === 'inventario' ? { nombre: document.getElementById('pNombre').value, precio: document.getElementById('pPrecio').value } :
                            col === 'experiencias' ? { jugador: document.getElementById('eJugador').value, jefe: document.getElementById('eJefe').value } :
                            { nombre: document.getElementById('jNombre').value, isla: document.getElementById('jIsla').value };

            await fetch(id ? `${API}/${col}/${id}` : `${API}/${col}`, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            cancelar(pre);
            cargarTodo();
        }

        function editar(pre, item) {
            document.getElementById(pre + 'Id').value = item._id;
            if(pre==='p'){ document.getElementById('pNombre').value=item.nombre; document.getElementById('pPrecio').value=item.precio; }
            if(pre==='e'){ document.getElementById('eJugador').value=item.jugador; document.getElementById('eJefe').value=item.jefe; }
            if(pre==='j'){ document.getElementById('jNombre').value=item.nombre; document.getElementById('jIsla').value=item.isla; }
            document.getElementById(pre + 'Btn').innerText = "Actualizar Registro";
            document.getElementById(pre + 'Cancel').style.display = "block";
        }

        async function eliminar(col, id) {
            if(confirm('¿Deseas eliminar este contrato del Casino?')) {
                await fetch(`${API}/${col}/${id}`, { method: 'DELETE' });
                cargarTodo();
            }
        }

        function cancelar(pre) {
            document.getElementById(pre + 'Id').value = "";
            const inputs = document.querySelectorAll(`section[id^="sec"] input`);
            inputs.forEach(i => { if(i.id.startsWith(pre)) i.value = ""; });
            document.getElementById(pre + 'Btn').innerText = pre==='p'?"Guardar":pre==='e'?"Registrar":"Añadir";
            document.getElementById(pre + 'Cancel').style.display = "none";
        }

        window.onload = cargarTodo;
    </script>
</body>
</html>
